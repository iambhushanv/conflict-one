
<div class="card">
    <div class="card-body">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Sr No</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Contact</th>
                    <th>Is Active</th>
                    <th>
                        Edit
                    </th>
                    <th>
                        Remove
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let std of getstdArr; let i = index">
                    <td>{{i+1}}</td>
                    <td>{{std.fname}}</td>
                    <td>{{std.lname}}</td>
                    <td>{{std.email}}</td>
                    <td>{{std.contact}}</td>
                    <td>{{std.isActive? 'Yes': 'No'}}</td>
                    <td><button class="btn btn-outline-primary">Edit</button></td>
                    <td><button class="btn btn-outline-danger">Remove</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
