
<div class="card">
    <div class="card-body">
        <div class="form-group">
            <label for="fname">First Name</label>
            <input type="text" #fname class="form-control">
        </div>
         <div class="form-group">
            <label for="lname">Last Name</label>
            <input type="text" #lname class="form-control">
        </div>
         <div class="form-group">
            <label for="email">Email</label>
            <input type="text" #email class="form-control">
        </div>
         <div class="form-group">
            <label for="contact">Contact</label>
            <input type="text" #contact class="form-control">
        </div>
         <div class="form-group">
            <label for="isActive">Is Active</label>
          <select #isActive class="form-control">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>
        <button *ngIf="!isInEditMode"  class="btn btn-outline-danger btn-block" (click)="addstudent()">Add Stuents</button>
         <button  *ngIf="isInEditMode" class="btn btn-outline-warning btn-block" (click)="onUpdatestd()">Update Stuents</button>
          
        </div>
        
  
</div>
